name: AgentOps Continuous Integration Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # --- STAGE 1: QUALITY CONTROLS ---
  code-hygiene:
    name: Linting and Code Hygiene Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python Runtime Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Python Poetry tools
      - name: Install Poetry package manager
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Node.js Monorepo verification
      - name: Install workspaces dependencies
        run: npm ci

      - name: Run Web styles/lint verification
        run: npm run lint

      # Python environments linting validation
      - name: Lint api-gateway package structures
        run: |
          cd apps/api-gateway
          poetry install --no-root
          poetry run black --check .
          poetry run mypy . --ignore-missing-imports

      - name: Lint agent-runtime package structures
        run: |
          cd apps/agent-runtime
          poetry install --no-root
          poetry run black --check .
          poetry run mypy . --ignore-missing-imports

  # --- STAGE 2: EXECUTION TESTING ---
  integration-tests:
    name: Execution Tests & Probes
    runs-on: ubuntu-latest
    needs: code-hygiene
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v4

      - name: Setup Python Runtime Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and execute Python unit tests
        run: |
          python -m pip install --upgrade pip
          pip install httpx
          python -m unittest discover -s tests -p "*_test.py"

      - name: Install dependencies and execute FastAPI Gateway Pytest Suite
        run: |
          cd apps/api-gateway
          python -m pip install --upgrade pip
          pip install "python-jose[cryptography]" "passlib[bcrypt]" fastapi uvicorn \
            pydantic pydantic-settings sqlalchemy aiosqlite httpx pytest \
            pytest-asyncio pytest-cov fakeredis anyio opentelemetry-api \
            opentelemetry-sdk opentelemetry-instrumentation-fastapi orjson
          python -m pytest tests/ --ignore=tests/test_generated_tools.py -v

      - name: Install dependencies and execute Agent Runtime Phase 2 Test Suite
        env:
          # Stub keys so the runtime env check passes without real credentials
          OPENAI_API_KEY: sk-stub-openai-key-for-ci
        run: |
          cd apps/agent-runtime
          python -m pip install --upgrade pip
          pip install \
            pydantic python-dotenv redis hiredis httpx \
            opentelemetry-api opentelemetry-sdk \
            "langgraph>=0.1.0" "langgraph-checkpoint-sqlite>=1.0.0" "langchain-core>=0.2.0" \
            "langchain-openai>=0.1.0" "langchain-anthropic>=0.1.0" \
            "openai>=1.30.0" \
            "pytest>=8.1.1" "pytest-asyncio>=0.23.6" "pytest-cov>=5.0.0" \
            "fakeredis[aioredis]>=2.23.0" "anyio[trio]>=4.3.0" \
            "typing-extensions>=4.10.0"
          python -m pytest tests/ -v --tb=short --asyncio-mode=auto

  # --- STAGE 3: CONTAINERIZATION BUILD & DOCKER HUB DEPLOYS ---
  docker-compilation:
    name: Multi-stage Container Compilation
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout monorepo code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub Registry
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Compile and push core front-end UI service
      - name: Build and push Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/ui.Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: agentops/ui:latest

      # Compile and push FastAPI Gateway API service
      - name: Build and push API Gateway Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api-gateway.Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: agentops/api-gateway:latest

      # Compile and push asynchronous Python Engine service
      - name: Build and push Agent Runtime Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/agent-runtime.Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: agentops/agent-runtime:latest
