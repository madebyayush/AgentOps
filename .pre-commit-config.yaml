# ==============================================================================
# AGENTOPS PRE-COMMIT CONFIGURATION
# Local checks before git commit triggers to enforce high-quality codes.
# ==============================================================================

repos:
  # --- CORE CODE SANITY CHECKS ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # --- PYTHON CODE STYLE (BLACK) ---
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        types: [python]
        args: [--line-length=100]

  # --- PYTHON TYPE SYNTAX CHECK (MYPY) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pydantic-settings, types-redis]
        args: [--ignore-missing-imports]

  # --- WEB WORKSPACE CODE QUALITY (ESLINT & PRETTIER) ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
        args: [--write]
