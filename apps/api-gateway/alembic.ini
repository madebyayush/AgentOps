# Alembic configuration for AgentOps API Gateway
# This file is used by `alembic` CLI.
# Run from: apps/api-gateway/

[alembic]
# Path to migration scripts, relative to this file
script_location = migrations

# Template used for generating new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# max length of characters to apply to the slug field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
revision_environment = false

# version_locations is empty — we use a single linear history
# version_locations =

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# --- DB URL is intentionally omitted here ---
# We read DATABASE_URL from the environment in migrations/env.py
# sqlalchemy.url is set programmatically in env.py
sqlalchemy.url =

[post_write_hooks]
# (none for now)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
