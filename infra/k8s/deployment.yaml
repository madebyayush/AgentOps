apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-api-gateway
  namespace: agentops
  labels:
    app: agentops-api-gateway
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentops-api-gateway
  template:
    metadata:
      labels:
        app: agentops-api-gateway
    spec:
      containers:
      - name: gateway
        image: agentops/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: agentops-secrets
        - configMapRef:
            name: agentops-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agentops-api-gateway-service
  namespace: agentops
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: agentops-api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentops-api-gateway-hpa
  namespace: agentops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentops-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
